const stats={health:60,power:20,fat:25,score:0},keys={},move={x:0,y:0},vel=new THREE.Vector3();let face=0,near=null,cool=0,eating=0,won=false,toastTimer;
function shape(){const f=C(stats.fat/100,0,1),p=C(stats.power/100,0,1);torso.scale.x=L(.86,1.55,f);torso.scale.z=L(.82,1.32,f);belly.scale.set(L(.82,1.65,f),L(.7,1.16,f),L(.7,1.55,f));belly.position.z=L(.18,.5,f);head.scale.setScalar(L(.96,1.15,f));shadow.scale.setScalar(L(.85,1.45,f));biceps.forEach(b=>b.scale.set(L(.75,1.55,p),L(.95,1.75,p),L(.75,1.55,p)));arms.forEach(a=>a.position.x=Math.sign(a.position.x)*L(.64,.83,Math.max(f,p)));const col=new THREE.Color().setHSL(L(.56,.08,f*.55),.65,.58);torso.material.color.copy(col);belly.material.color.copy(col)}function hud(){[['health','h'],['power','p'],['fat','f']].forEach(([k,id])=>{document.querySelector('#'+id+'v').textContent=Math.round(stats[k]);document.querySelector('#'+id+'b').style.width=C(stats[k],0,100)+'%'});document.querySelector('#sv').textContent=Math.round(stats.score);document.querySelector('#sb').style.width=stats.score%100+'%';shape();if(!won&&stats.power>=80&&stats.fat<40){won=true;toast('🏆 健康大成功！<br><small>你成為餐廳力量之星！</small>',2600)}}function toast(t,d=1100){const e=document.querySelector('#toast');e.innerHTML=t;e.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>e.classList.remove('show'),d)}hud();
function eat(f){if(!f||!f.on||cool>0)return;f.on=false;f.group.visible=false;cool=.85;eating=.7;stats.health=C(stats.health+f.health,0,100);stats.power=C(stats.power+f.power,0,100);stats.fat=C(stats.fat+f.fat,0,100);stats.score=Math.max(0,stats.score+f.score);toast(f.emoji+' '+f.name+'<br><small>'+(f.type==='good'?'健康＋ 力量＋ 體脂－':'體脂＋ 健康－')+'</small>',1250);hud();setTimeout(()=>{f.on=true;f.group.visible=true},4300)}function action(){if(started&&near)eat(near)}
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=1;if(e.key.toLowerCase()==='e'||e.key===' '){e.preventDefault();action()}});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=0);document.querySelector('#eat').addEventListener('pointerdown',e=>{e.preventDefault();action()});document.querySelector('#cam').onclick=()=>{camMode=(camMode+1)%2;toast(camMode?'🎥 近距離鏡頭':'🎥 標準鏡頭',700)};document.querySelector('#play').onclick=()=>{started=true;document.querySelector('#start').classList.add('hide');setTimeout(()=>document.querySelector('#start').style.display='none',500);toast('👨‍🍳 歡迎！左邊是健康餐，右邊是快餐。',1700)};
const joy=document.querySelector('#joy'),knob=document.querySelector('#knob');let jid=null;function joyMove(e){const r=joy.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;let x=e.clientX-cx,y=e.clientY-cy,n=Math.hypot(x,y)||1,max=39;if(n>max){x=x/n*max;y=y/n*max}knob.style.transform=`translate(${x}px,${y}px)`;move.x=x/max;move.y=y/max}joy.onpointerdown=e=>{jid=e.pointerId;joy.setPointerCapture(jid);joyMove(e)};joy.onpointermove=e=>{if(e.pointerId===jid)joyMove(e)};function joyEnd(e){if(e.pointerId===jid){jid=null;move.x=move.y=0;knob.style.transform='translate(0,0)'}}joy.onpointerup=joyEnd;joy.onpointercancel=joyEnd;
function angle(a,b,t){return a+Math.atan2(Math.sin(b-a),Math.cos(b-a))*t}function updatePlayer(dt,t){let x=move.x,z=move.y;if(keys.a||keys.arrowleft)x--;if(keys.d||keys.arrowright)x++;if(keys.w||keys.arrowup)z--;if(keys.s||keys.arrowdown)z++;let n=Math.hypot(x,z);if(n>1){x/=n;z/=n}const active=started&&n>.08&&eating<=0,speed=L(5.2,3.45,stats.fat/100)+L(0,.55,stats.power/100);vel.x=L(vel.x,active?x*speed:0,1-Math.pow(.0001,dt));vel.z=L(vel.z,active?z*speed:0,1-Math.pow(.0001,dt));player.position.x=C(player.position.x+vel.x*dt,-17.3,17.3);player.position.z=C(player.position.z+vel.z*dt,-12.3,12.6);if(active){face=angle(face,Math.atan2(x,z),1-Math.pow(.0005,dt));player.rotation.y=face}const walk=Math.min(1,Math.hypot(vel.x,vel.z)/3),g=Math.sin(t*11)*.55*walk;legs[0].rotation.x=g;legs[1].rotation.x=-g;arms[0].rotation.x=-g*.65;arms[1].rotation.x=g*.65;body.position.y=1.14+Math.abs(Math.sin(t*11))*.07*walk;if(eating>0){eating-=dt;arms[0].rotation.x=L(arms[0].rotation.x,-1.8,.25);arms[1].rotation.x=L(arms[1].rotation.x,-1.8,.25);head.rotation.x=Math.sin(t*22)*.08}else head.rotation.x=L(head.rotation.x,0,.15);cool=Math.max(0,cool-dt)}
function updateFood(t){let best=null,dist=2.05;for(const f of foods)if(f.on){f.group.position.y=1.92+Math.sin(t*2.2+f.phase)*.08;f.group.rotation.y=Math.sin(t*.9+f.phase)*.12;f.halo.material.opacity=.32+Math.sin(t*3+f.phase)*.15;const d=Math.hypot(player.position.x-f.x,player.position.z-f.z);if(d<dist){dist=d;best=f}}near=best;const p=document.querySelector('#prompt');if(best&&started){p.innerHTML='<span class="key">E</span> 吃 '+best.emoji+' '+best.name+'　<span style="color:'+(best.type==='good'?'#8dffa9':'#ffb39f')+'">'+(best.type==='good'?'健康選擇':'高糖高脂')+'</span>';p.classList.add('show')}else p.classList.remove('show')}
function updateCam(dt){const d=camMode?5.2:8.4,h=camMode?4.1:6.4,forward=new THREE.Vector3(Math.sin(face),0,Math.cos(face)),desired=player.position.clone().addScaledVector(forward,-d).add(new THREE.Vector3(0,h,0));camera.position.lerp(desired,1-Math.pow(.002,dt));camera.lookAt(player.position.x,player.position.y+1.4,player.position.z)}function loop(){const dt=Math.min(clock.getDelta(),.04),t=clock.elapsedTime;chef.rotation.y=Math.sin(t*.7)*.18;updatePlayer(dt,t);updateFood(t);updateCam(dt);renderer.render(scene,camera);requestAnimationFrame(loop)}camera.position.set(0,7,18);loop();addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,1.7))});
</script>
